<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIAD 𝙷𝙾𝚂𝚃 - تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #03050b; color: #eef2ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .bg-aurora { position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 30%, rgba(45,122,255,0.18), transparent 65%), radial-gradient(ellipse at 85% 70%, rgba(0,229,255,0.12), transparent 60%), radial-gradient(ellipse at 60% 90%, rgba(120,40,255,0.1), transparent 55%); z-index: -1; animation: auroraShift 12s ease-in-out infinite alternate; }
        @keyframes auroraShift { from { opacity:0.8; } to { opacity:1; filter: hue-rotate(20deg); } }
        .particles { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
        .particle { position: absolute; width: 2px; height: 2px; background: rgba(45,122,255,0.6); border-radius: 50%; animation: float linear infinite; }
        @keyframes float { 0% { transform: translateY(100vh) translateX(0); opacity:0; } 10% { opacity:1; } 90% { opacity:0.5; } 100% { transform: translateY(-10vh) translateX(40px); opacity:0; } }
        .login-wrap { width: 100%; max-width: 440px; padding: 20px; animation: fadeInUp 0.6s ease; }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
        .login-card { background: rgba(10,14,30,0.85); backdrop-filter: blur(24px); border: 1px solid rgba(45,122,255,0.3); border-radius: 32px; padding: 40px 36px; box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(45,122,255,0.1) inset; }
        .brand { text-align: center; margin-bottom: 32px; }
        .brand-icon { width: 72px; height: 72px; background: linear-gradient(145deg, #0f172a, #0d1526); border: 1.5px solid rgba(0,229,255,0.5); border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #00e5ff; margin: 0 auto 16px; box-shadow: 0 0 24px rgba(0,229,255,0.25), 0 0 60px rgba(45,122,255,0.15); }
        .brand-name { font-size: 1.5rem; font-weight: 800; letter-spacing: 3px; background: linear-gradient(135deg, #2d7aff, #00e5ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .brand-sub { font-size: 0.8rem; color: #6b7aaa; margin-top: 6px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 28px; background: rgba(255,255,255,0.03); border-radius: 40px; padding: 4px; border: 1px solid rgba(45,122,255,0.15); }
        .tab-btn { flex: 1; padding: 10px; border-radius: 36px; border: none; background: none; color: #9ca3cf; font-family: 'Tajawal', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.25s; }
        .tab-btn.active { background: linear-gradient(135deg, #2d7aff, #1a5cd8); color: white; box-shadow: 0 4px 14px rgba(45,122,255,0.4); }
        .form-group { margin-bottom: 18px; }
        .form-label { display: block; font-size: 0.8rem; color: #9ca3cf; margin-bottom: 8px; font-weight: 600; }
        .form-input { width: 100%; padding: 13px 18px; background: rgba(255,255,255,0.04); border: 1px solid rgba(45,122,255,0.25); border-radius: 14px; color: #eef2ff; font-family: 'Tajawal', sans-serif; font-size: 0.95rem; outline: none; transition: all 0.2s; }
        .form-input:focus { border-color: #2d7aff; background: rgba(45,122,255,0.07); box-shadow: 0 0 0 3px rgba(45,122,255,0.12); }
        .form-input::placeholder { color: #4b556b; }
        .input-icon-wrap { position: relative; }
        .input-icon-wrap .form-input { padding-right: 44px; }
        .input-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #4b556b; font-size: 0.9rem; }
        .submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #2d7aff, #1a5cd8); border: none; border-radius: 14px; color: white; font-family: 'Tajawal', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.25s; box-shadow: 0 6px 20px rgba(45,122,255,0.4); display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 8px; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(45,122,255,0.55); }
        .submit-btn:active { transform: translateY(0); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .alert { border-radius: 12px; padding: 12px 16px; font-size: 0.82rem; margin-bottom: 16px; display: none; align-items: center; gap: 10px; }
        .alert.error { background: rgba(255,61,90,0.1); border: 1px solid rgba(255,61,90,0.3); color: #ff7a94; }
        .alert.success { background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.3); color: #00ff88; }
        .alert.show { display: flex; animation: alertIn 0.3s ease; }
        @keyframes alertIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
        .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: #4b556b; font-size: 0.75rem; }
        .divider::before, .divider::after { content:''; flex:1; height:1px; background: rgba(45,122,255,0.15); }
        .tg-btn { width: 100%; padding: 12px; background: rgba(0,136,204,0.12); border: 1px solid rgba(0,136,204,0.3); border-radius: 14px; color: #29b5e8; font-family: 'Tajawal', sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.25s; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; }
        .tg-btn:hover { background: rgba(0,136,204,0.2); border-color: rgba(0,136,204,0.5); transform: translateY(-1px); }
        .spinner-sm { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer-note { text-align: center; margin-top: 24px; font-size: 0.75rem; color: #4b556b; }
        .footer-note a { color: #2d7aff; text-decoration: none; font-weight: 600; }
        .info-box { background: rgba(0,229,255,0.07); border: 1px solid rgba(0,229,255,0.2); border-radius: 14px; padding: 12px 16px; margin-bottom: 18px; font-size: 0.75rem; color: #9ca3cf; text-align: center; }
        .features-list { background: rgba(45,122,255,0.05); border-radius: 16px; padding: 16px; margin-bottom: 20px; text-align: center; }
        .features-list h4 { color: #2d7aff; margin-bottom: 12px; font-size: 0.85rem; }
        .features-list p { font-size: 0.7rem; color: #9ca3cf; line-height: 1.6; }
    </style>
</head>
<body>
<div class="bg-aurora"></div>
<div class="particles" id="particles"></div>

<div class="login-wrap">
    <div class="login-card">
        <div class="brand">
            <div class="brand-icon"><i class="fas fa-crown"></i></div>
            <div class="brand-name">ZIAD 𝙷𝙾𝚂𝚃</div>
            <div class="brand-sub">منصة استضافة بوتات تيليجرام و Node.js</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">
                <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
            </button>
            <button class="tab-btn" id="registerTab" onclick="switchTab('register')">
                <i class="fas fa-user-plus"></i> اشتراك جديد
            </button>
        </div>

        <div class="alert" id="alert">
            <i class="fas fa-exclamation-circle"></i>
            <span id="alertMsg"></span>
        </div>

        <div id="loginForm">
            <div class="info-box">
                <i class="fas fa-info-circle"></i> قم بتسجيل الدخول للوصول إلى لوحة التحكم
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-user"></i> اسم المستخدم</label>
                <div class="input-icon-wrap">
                    <input type="text" class="form-input" id="loginUsername" placeholder="أدخل اسم المستخدم" autocomplete="username">
                    <i class="fas fa-user input-icon"></i>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-lock"></i> كلمة المرور</label>
                <div class="input-icon-wrap">
                    <input type="password" class="form-input" id="loginPassword" placeholder="أدخل كلمة المرور" autocomplete="current-password">
                    <i class="fas fa-lock input-icon"></i>
                </div>
            </div>
            <button class="submit-btn" id="loginBtn" onclick="doLogin()">
                <span id="loginText"><i class="fas fa-sign-in-alt"></i> دخول</span>
                <div class="spinner-sm" id="loginSpinner"></div>
            </button>
        </div>

        <div id="registerForm" style="display:none;">
            <div class="features-list">
                <h4><i class="fas fa-gift"></i> مميزات الخطة المجانية</h4>
                <p>✨ 500 GB مساحة تخزين | ✨ سيرفرين كحد أقصى | ✨ 256 MB رام | ✨ دعم Python و Node.js</p>
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-user"></i> اسم المستخدم</label>
                <div class="input-icon-wrap">
                    <input type="text" class="form-input" id="regUsername" placeholder="اختر اسم مستخدم" autocomplete="off">
                    <i class="fas fa-user input-icon"></i>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-lock"></i> كلمة المرور</label>
                <div class="input-icon-wrap">
                    <input type="password" class="form-input" id="regPassword" placeholder="اختر كلمة مرور (4 أحرف+)" autocomplete="new-password">
                    <i class="fas fa-lock input-icon"></i>
                </div>
            </div>
            <button class="submit-btn" id="registerBtn" onclick="doRegister()">
                <span id="registerText"><i class="fas fa-user-plus"></i> إنشاء حساب</span>
                <div class="spinner-sm" id="registerSpinner"></div>
            </button>

            <div class="divider">أو تواصل معنا</div>
            <a href="https://t.me/ELZO_z" target="_blank" class="tg-btn">
                <i class="fab fa-telegram-plane" style="font-size:1.2rem;"></i>
                تواصل مع الدعم @ELZO_z
            </a>
        </div>

        <div class="footer-note">
            🛠 ELZO_z بواسطة <a href="https://t.me/I_tt_6" target="_blank">@ELZO_z</a> &nbsp;|&nbsp; ZIAD HOST v3
        </div>
    </div>
</div>

<script>
    const container = document.getElementById('particles');
    for(let i = 0; i < 28; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (6 + Math.random() * 12) + 's';
        p.style.animationDelay = (Math.random() * 10) + 's';
        p.style.width = p.style.height = (1 + Math.random() * 2.5) + 'px';
        p.style.opacity = 0.3 + Math.random() * 0.7;
        container.appendChild(p);
    }

    function switchTab(tab) {
        clearAlert();
        if(tab === 'login') {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('registerTab').classList.remove('active');
        } else {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('loginTab').classList.remove('active');
            document.getElementById('registerTab').classList.add('active');
        }
    }

    function showAlert(msg, type='error') {
        const el = document.getElementById('alert');
        const icon = el.querySelector('i');
        el.className = `alert ${type} show`;
        icon.className = `fas ${type==='success' ? 'fa-check-circle' : 'fa-exclamation-circle'}`;
        document.getElementById('alertMsg').textContent = msg;
    }
    function clearAlert() {
        document.getElementById('alert').className = 'alert';
    }

    function setLoading(btn, spinner, text, loading) {
        document.getElementById(btn).disabled = loading;
        document.getElementById(spinner).style.display = loading ? 'block' : 'none';
        document.getElementById(text).style.display = loading ? 'none' : 'flex';
    }

    async function doLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        if(!username || !password) { showAlert('الرجاء إدخال اسم المستخدم وكلمة المرور'); return; }
        clearAlert();
        setLoading('loginBtn', 'loginSpinner', 'loginText', true);
        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();
            if(data.success) {
                showAlert('✅ مرحباً! جاري التحويل...', 'success');
                setTimeout(() => window.location.href = data.redirect || '/', 800);
            } else {
                showAlert(data.message || 'بيانات غير صحيحة');
                setLoading('loginBtn', 'loginSpinner', 'loginText', false);
            }
        } catch(e) {
            showAlert('خطأ في الاتصال بالخادم');
            setLoading('loginBtn', 'loginSpinner', 'loginText', false);
        }
    }

    async function doRegister() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        if(!username || !password) { showAlert('الرجاء إدخال جميع البيانات'); return; }
        if(username.length < 3) { showAlert('اسم المستخدم 3 أحرف على الأقل'); return; }
        if(password.length < 4) { showAlert('كلمة المرور 4 أحرف على الأقل'); return; }
        clearAlert();
        setLoading('registerBtn', 'registerSpinner', 'registerText', true);
        try {
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();
            if(data.success) {
                showAlert(data.message || '✅ تم إنشاء حسابك بنجاح! يمكنك تسجيل الدخول الآن.', 'success');
                document.getElementById('regUsername').value = '';
                document.getElementById('regPassword').value = '';
                setTimeout(() => switchTab('login'), 1500);
            } else {
                showAlert(data.message || 'فشل إنشاء الحساب');
            }
        } catch(e) {
            showAlert('خطأ في الاتصال بالخادم');
        }
        setLoading('registerBtn', 'registerSpinner', 'registerText', false);
    }

    document.addEventListener('keydown', e => {
        if(e.key === 'Enter') {
            const loginVisible = document.getElementById('loginForm').style.display !== 'none';
            if(loginVisible) doLogin();
            else doRegister();
        }
    });

    fetch('/api/current_user').then(r => r.json()).then(d => {
        if(d.success) window.location.href = d.is_admin ? '/admin' : '/dashboard';
    }).catch(() => {});
</script>
</body>
</html>
